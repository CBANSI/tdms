<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TDMS Admin Dashboard</title>
  <link rel="icon" type="image/png" href="assets/logos/tdms-logo.png.png">
  <link rel="stylesheet" href="styles.css?v=20260426a">
</head>
<body data-page="admin">
  <div class="page-shell">
    <button class="ghost-button theme-toggle dashboard-theme-floating" data-theme-toggle type="button">Dark mode</button>
    <div class="app-shell student-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark logo-frame is-fallback" data-logo-role="tdms">
            <img alt="TDMS logo">
            <span>TD</span>
          </div>
        </div>

        <nav id="adminSectionMenu" class="task-view-menu" aria-label="Admin sections">
          <p class="nav-label">Menu</p>
          <button class="task-view-button is-active" type="button" data-admin-tab="requirements" aria-label="Requirements reminder" title="Requirements reminder">
            <span class="task-view-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="5" width="18" height="16" rx="3"></rect>
                <path d="M8 3v4M16 3v4M3 10h18"></path>
                <path d="M8 14h8M8 18h5"></path>
              </svg>
            </span>
            <span>Requirements reminder</span>
          </button>
          <button class="task-view-button" type="button" data-admin-tab="announcements" aria-label="Post announcement" title="Post announcement">
            <span class="task-view-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 11.5V8.5a2.5 2.5 0 0 1 2.5-2.5h4l4-2v14l-4-2h-4A2.5 2.5 0 0 1 4 13.5z"></path>
                <path d="M9 18v2"></path>
              </svg>
            </span>
            <span>Post announcement</span>
          </button>
        </nav>
      </aside>

      <main class="main-content">
        <header class="topbar">
          <div class="topbar-actions">
            <button id="printReportBtn" class="primary-button" type="button">Print report</button>
            <button id="logoutBtn" class="ghost-button" type="button">Logout</button>
          </div>
        </header>

        <section class="hero-panel">
          <div class="hero-panel-row">
            <div>
              <p id="adminHeaderRole" class="eyebrow">Admin</p>
              <h2 id="adminHeaderName">Reminder center</h2>
            </div>
          </div>
        </section>

        <div class="student-tab-panels">
          <section class="student-tab-panel is-active" data-admin-tab-panel="requirements">
            <div class="task-view-stack">
              <article class="panel">
                <div class="panel-heading">
                  <div>
                    <p class="eyebrow">Requirements reminder</p>
                    <h3>Add reminder</h3>
                  </div>
                </div>

                <form id="adminReminderForm" class="form-grid">
                  <label>
                    Send to
                    <select id="adminReminderTargetMode" name="adminReminderTargetMode" required>
                      <option value="student" selected>One student</option>
                      <option value="year">All students by year</option>
                    </select>
                  </label>
                  <label id="adminReminderYearWrap">
                    Year level
                    <select id="adminReminderYearLevel" name="adminReminderYearLevel">
                      <option value="">Select year</option>
                      <option value="1st Year">1st Year</option>
                      <option value="2nd Year">2nd Year</option>
                      <option value="3rd Year">3rd Year</option>
                      <option value="4th Year">4th Year</option>
                    </select>
                  </label>
                  <label>
                    Student
                    <select id="adminReminderStudent" name="adminReminderStudent" required></select>
                  </label>
                  <label>
                    Date of deadline
                    <input id="adminReminderDueDate" name="adminReminderDueDate" type="date" required>
                  </label>
                  <label class="full-width">
                    Requirement
                    <input id="adminReminderTitle" name="adminReminderTitle" type="text" placeholder="e.g. OJT form" required>
                  </label>
                  <label class="full-width">
                    Notes
                    <textarea id="adminReminderNotes" name="adminReminderNotes" rows="3" placeholder="Short reminder details"></textarea>
                  </label>
                  <button class="primary-button" type="submit">Save reminder</button>
                </form>
              </article>

              <article class="panel">
                <div class="panel-heading">
                  <div>
                    <p class="eyebrow">Requirements reminder</p>
                    <h3>Reminder list</h3>
                  </div>
                </div>
                <div id="reminderList" class="reminder-list"></div>
              </article>
            </div>
          </section>

          <section class="student-tab-panel" data-admin-tab-panel="announcements">
            <div class="task-view-stack">
              <article class="panel">
                <div class="panel-heading">
                  <div>
                    <p class="eyebrow">Post announcement</p>
                    <h3>Add announcement</h3>
                  </div>
                </div>

                <form id="adminAnnouncementForm" class="form-grid">
                  <label class="full-width">
                    Title
                    <input id="adminAnnouncementTitle" name="adminAnnouncementTitle" type="text" placeholder="e.g. OJT orientation" required>
                  </label>
                  <label>
                    Calendar date
                    <input id="adminAnnouncementDate" name="adminAnnouncementDate" type="date" required>
                  </label>
                  <label class="full-width">
                    Details
                    <textarea id="adminAnnouncementMessage" name="adminAnnouncementMessage" rows="4" placeholder="Write the announcement that students should see in their calendar." required></textarea>
                  </label>
                  <button class="primary-button" type="submit">Post announcement</button>
                </form>
              </article>

              <article class="panel">
                <div class="panel-heading">
                  <div>
                    <p class="eyebrow">Post announcement</p>
                    <h3>Announcement list</h3>
                  </div>
                </div>
                <div id="adminAnnouncementList" class="reminder-list"></div>
              </article>
            </div>
          </section>
        </div>
      </main>
    </div>
  </div>

  <template id="emptyStateTemplate">
    <div class="empty-state">
      <p>No records available yet.</p>
    </div>
  </template>

  <script src="auth.js?v=20260403c"></script>
  <script src="app.js?v=20260426a"></script>
</body>
</html>
