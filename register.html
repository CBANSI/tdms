<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TDMS Student Registration</title>
  <link rel="icon" type="image/png" href="assets/logos/tdms-logo.png.png">
  <link rel="stylesheet" href="styles.css?v=20260417b">
</head>
<body data-page="register">
  <div class="login-screen">
    <div class="login-card">
      <button class="ghost-button theme-toggle theme-toggle-floating" data-theme-toggle type="button">Dark mode</button>
      <section class="login-brand-panel">
        <div class="login-panel-top">
          <div class="brand">
            <div class="brand-mark logo-frame is-fallback" data-logo-role="tdms">
              <img alt="TDMS logo">
              <span>TD</span>
            </div>
            <div>
              <h1>TDMS</h1>
              <p>Task and Deadline Management System</p>
            </div>
          </div>
        </div>
        <p class="eyebrow">Register</p>
        <h2>Create account</h2>
        <p class="hero-copy">Student account only.</p>
        <div class="login-info-list">
          <div class="mini-action-item">
            <strong>Login</strong>
            <span>Student ID or Gmail + password</span>
          </div>
          <div class="mini-action-item">
            <strong>Google</strong>
            <span>Optional for later</span>
          </div>
        </div>
      </section>

      <section class="login-form-panel">
        <div class="login-panel-top login-panel-top-right">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Student</p>
              <h3>Create account</h3>
            </div>
          </div>
          <div class="panel-emblem logo-frame is-fallback panel-emblem-diploma" data-logo-role="diploma">
            <img alt="Diploma Program logo">
            <span>DIP</span>
          </div>
        </div>

        <section class="register-panel register-page-panel">
          <form id="registerForm" class="form-grid" method="post" action="#">
            <label>
              <input id="registerStudentId" name="registerStudentId" type="text" placeholder="Student ID" pattern="[0-9]{4}-[0-9]{3}-[0-9]{5}" aria-label="Student ID" required>
            </label>
            <label>
              <input id="registerFullName" name="registerFullName" type="text" placeholder="Full name" aria-label="Full name" required>
            </label>
            <label>
              <input id="registerProgram" name="registerProgram" type="text" placeholder="Program" aria-label="Program" required>
            </label>
            <label>
              <input id="registerEmail" name="registerEmail" type="email" placeholder="Gmail / email" aria-label="Gmail or email" required>
            </label>
            <label>
              <input id="registerPassword" name="registerPassword" type="password" placeholder="Password" aria-label="Password" required>
            </label>
            <label>
              <input id="registerPasswordConfirm" name="registerPasswordConfirm" type="password" placeholder="Confirm password" aria-label="Confirm password" required>
            </label>
            <label class="full-width">
              <input id="registerContact" name="registerContact" type="text" placeholder="Contact number (optional)" aria-label="Contact number">
            </label>
            <div class="action-row full-width">
              <button class="primary-button" type="submit">Create student account</button>
              <a class="ghost-button" href="index.html">Back to login</a>
            </div>
          </form>

          <p id="registerStatus" class="login-status" aria-live="polite"></p>
        </section>
      </section>
    </div>
  </div>

  <template id="emptyStateTemplate">
    <div class="empty-state">
      <p>No records available yet.</p>
    </div>
  </template>

  <script src="auth.js?v=20260419a"></script>
  <script src="app.js?v=20260419a"></script>
</body>
</html>
