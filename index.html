<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TDMS Login</title>
  <link rel="icon" type="image/png" href="assets/logos/tdms-logo.png.png">
  <link rel="stylesheet" href="styles.css?v=20260417b">
</head>
<body data-page="login">
  <div id="loginScreen" class="login-screen">
    <button class="ghost-button theme-toggle theme-toggle-floating" data-theme-toggle type="button">Dark mode</button>
    <div class="login-card">
      <section class="login-form-panel">
        <div class="login-panel-top login-panel-top-right">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">TDMS Account Access</p>
              <h3>Sign in</h3>
            </div>
          </div>
          <div class="panel-emblem logo-frame is-fallback panel-emblem-diploma" data-logo-role="diploma">
            <img alt="Diploma Program logo">
            <span>DIP</span>
          </div>
        </div>

        <form id="loginForm" class="form-grid login-form" method="post" action="#">
          <div class="login-form-row login-form-row-identifier">
            <label class="login-form-cell login-form-cell-identifier">
              <input id="loginIdentifier" name="loginIdentifier" type="text" placeholder="Enter username" required>
            </label>
          </div>
          <div class="login-form-row login-form-row-password">
            <label class="login-form-cell login-form-cell-password">
              <input id="loginSecret" name="loginSecret" type="password" placeholder="Enter password" required>
            </label>
          </div>
          <div class="login-form-row login-form-row-submit">
            <div class="login-form-cell login-form-cell-submit">
              <button class="primary-button" type="submit">Open dashboard</button>
            </div>
          </div>
        </form>

        <div id="studentAccessPanel" class="secondary-access" hidden>
          <a class="ghost-button wide-button" href="register.html">Register as student</a>
        </div>
      </section>
    </div>
  </div>

  <template id="emptyStateTemplate">
    <div class="empty-state">
      <p>No records available yet.</p>
    </div>
  </template>

  <script src="auth.js?v=20260419a"></script>
  <script src="app.js?v=20260419a"></script>
</body>
</html>
